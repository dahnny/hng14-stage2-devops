name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8
          npm install --prefix frontend --no-save eslint@9

      - name: Lint Python
        run: flake8 api worker

      - name: Lint JavaScript
        working-directory: frontend
        run: npx eslint app.js

      - name: Lint Dockerfiles
        run: |
          for dockerfile in api/Dockerfile frontend/Dockerfile worker/Dockerfile; do
            docker run --rm -i hadolint/hadolint:v2.12.0 < "$dockerfile"
          done

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.txt pytest-cov

      - name: Run API unit tests with coverage
        working-directory: api
        run: |
          mkdir -p ../artifacts/coverage
          pytest tests --cov=main --cov-report=term-missing --cov-report=xml:../artifacts/coverage/api-coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: artifacts/coverage/api-coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Build Images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker tag localhost:5000/api:${{ github.sha }} localhost:5000/api:latest

          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend
          docker tag localhost:5000/frontend:${{ github.sha }} localhost:5000/frontend:latest

          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker tag localhost:5000/worker:${{ github.sha }} localhost:5000/worker:latest

          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Save built images
        run: |
          mkdir -p artifacts/images
          docker save localhost:5000/api:${{ github.sha }} localhost:5000/api:latest | gzip > artifacts/images/api-image.tar.gz
          docker save localhost:5000/frontend:${{ github.sha }} localhost:5000/frontend:latest | gzip > artifacts/images/frontend-image.tar.gz
          docker save localhost:5000/worker:${{ github.sha }} localhost:5000/worker:latest | gzip > artifacts/images/worker-image.tar.gz

      - name: Upload built images
        uses: actions/upload-artifact@v4
        with:
          name: built-images
          path: artifacts/images

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: built-images
          path: artifacts/images

      - name: Load built images
        run: |
          gzip -dc artifacts/images/api-image.tar.gz | docker load
          gzip -dc artifacts/images/frontend-image.tar.gz | docker load
          gzip -dc artifacts/images/worker-image.tar.gz | docker load

      - name: Scan API Images
        uses: aquasecurity/trivy-action@v0.9.0
        with:
          image-ref: "localhost:5000/api:latest"
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Scan Frontend Images
        uses: aquasecurity/trivy-action@v0.9.0
        with:
          image-ref: "localhost:5000/frontend:latest"
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL'
          exit-code: '1'
      
      - name: Scan Worker Images
        uses: aquasecurity/trivy-action@v0.9.0
        with:
          image-ref: "localhost:5000/worker:latest"
          format: 'sarif'
          output: 'trivy-worker.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Upload API scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif
          category: api

      - name: Upload Frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: frontend

      - name: Upload Worker scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-worker.sarif
          category: worker

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d 

      - name: Wait for Frontend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/healthz; then
              echo "Frontend is healthy!"
              break
            fi
            sleep 2
          done
      - name: Submit Job
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"

          JOB_ID=$(echo "$RESPONSE" | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll Job Status
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID)
            echo "Status: $STATUS"

            if echo "$STATUS" | grep "completed"; then
              echo "Job completed successfully!"
              exit 0
            fi
            
            sleep 2
          done
          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download built images
        uses: actions/download-artifact@v4
        with:
          name: built-images
          path: artifacts/images

      - name: Load built images
        run: |
          gzip -dc artifacts/images/api-image.tar.gz | docker load
          gzip -dc artifacts/images/frontend-image.tar.gz | docker load
          gzip -dc artifacts/images/worker-image.tar.gz | docker load

      - name: Start new stack
        env: 
          FRONTEND_PORT: 3001
          API_HOST_PORT: 8001
        run: |
          docker compose -p new up -d

      - name: Wait for Frontend
        run: |
          for i in {1..12}; do
            if curl -s http://localhost:${FRONTEND_PORT}/healthz; then
              echo "Frontend is healthy!"
              break
            fi
            sleep 5
          done
      
      - name: Test new Stack
        env: 
          FRONTEND_PORT: 3001
          API_HOST_PORT: 8001
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:${FRONTEND_PORT}/submit)
          echo "Response: $RESPONSE"

          JOB_ID=$(echo "$RESPONSE" | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

          for i in {1..12}; do
            STATUS=$(curl -s http://localhost:${FRONTEND_PORT}/status/$JOB_ID)
            echo "Status: $STATUS"

            if echo "$STATUS" | grep "completed"; then
              echo "Job completed successfully!"
              exit 0
            fi
            
            sleep 5
          done
          echo "Job did not complete in time"
          exit 1

      - name: Switch traffic
        env: 
          FRONTEND_PORT: 3001
          API_HOST_PORT: 8001
        run: |
          docker compose down -v
          FRONTEND_PORT=3000 API_HOST_PORT=8000 docker compose -p new up -d